name: Build Excel-DNA Addin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ 获取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 安装 .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      # 3️⃣ 恢复依赖
      - name: Restore dependencies
        run: dotnet restore MyFunctions/MyFunctions.csproj

      # 4️⃣ 构建 DLL
      - name: Build DLL
        run: dotnet build MyFunctions/MyFunctions.csproj -c Release

      # 5️⃣ 复制 DLL 到 ExcelDna 文件夹
      - name: Copy DLL to ExcelDna folder
        run: copy MyFunctions\bin\Release\net7.0\MyFunctions.dll ExcelDna\

      # 6️⃣ 生成最终 XLL 文件
      - name: Package XLL
        run: |
          cd ExcelDna
          ren ExcelDna.xll MyAddin.xll

      # 7️⃣ 上传构建产物（v4）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyAddin-xll
          path: ExcelDna\MyAddin.xll