name: Build Excel-DNA Addin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ 获取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 安装 .NET 10 SDK（预览版）
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      # 3️⃣ 清理旧构建
      - name: Clean previous build
        run: dotnet clean MyFunctions/MyFunctions.csproj

      # 4️⃣ 恢复依赖
      - name: Restore dependencies
        run: dotnet restore MyFunctions/MyFunctions.csproj

      # 5️⃣ 构建 DLL
      - name: Build DLL
        run: dotnet build MyFunctions/MyFunctions.csproj -c Release

      # 6️⃣ 显示 DLL 信息（大小 + SHA256）
      - name: Show DLL info
        run: |
          dir MyFunctions\bin\Release\net10.0\MyFunctions.dll
          powershell -Command "Get-FileHash MyFunctions\bin\Release\net10.0\MyFunctions.dll"

      # 7️⃣ 复制 DLL 到 ExcelDna 文件夹
      - name: Copy DLL to ExcelDna folder
        run: copy MyFunctions\bin\Release\net10.0\MyFunctions.dll ExcelDna\

      # 8️⃣ 使用项目里的 ExcelDnaPack.exe 嵌入 DLL
      - name: Embed DLL into XLL
        run: |
          cd ExcelDna
          .\ExcelDnaPack.exe MyAddin.dna /Y /O:MyAddin.xll

      # 9️⃣ 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyAddin-xll
          path: ExcelDna\MyAddin.xll