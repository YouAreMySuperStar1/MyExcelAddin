name: Build Excel-DNA Addin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ 获取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 安装 .NET 10 SDK
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.300'

      # 3️⃣ 清理旧构建
      - name: Clean previous build
        run: dotnet clean MyFunctions/MyFunctions.csproj

      # 4️⃣ 恢复依赖
      - name: Restore dependencies
        run: dotnet restore MyFunctions/MyFunctions.csproj

      # 5️⃣ 构建 DLL
      - name: Build DLL
        run: dotnet build MyFunctions/MyFunctions.csproj -c Release

      # 6️⃣ 输出 DLL 信息（大小 + SHA256）
      - name: Show DLL info
        run: |
          dir MyFunctions\bin\Release\net10.0
          powershell -Command "Get-FileHash MyFunctions\bin\Release\net10.0\MyFunctions.dll"

      # 7️⃣ 确保 ExcelDna 文件夹存在
      - name: Ensure ExcelDna folder exists
        run: |
          if (-Not (Test-Path ExcelDna)) { New-Item -ItemType Directory -Path ExcelDna }

      # 8️⃣ 复制 DLL 到 ExcelDna 文件夹
      - name: Copy DLL to ExcelDna folder
        run: |
          Copy-Item -Path MyFunctions\bin\Release\net10.0\MyFunctions.dll -Destination ExcelDna\

      # 9️⃣ 列出 ExcelDna 文件夹，确认文件存在
      - name: List ExcelDna folder
        run: dir ExcelDna

      # 🔟 使用 ExcelDnaPack.exe 嵌入 DLL 生成 XLL
      - name: Embed DLL into XLL
        run: ExcelDna\ExcelDnaPack.exe ExcelDna\MyFunctions.dna /Y /O:ExcelDna\MyFunctions.xll

      # 1️⃣1️⃣ 列出 ExcelDna 文件夹，确认 XLL 已生成
      - name: List ExcelDna folder after pack
        run: dir ExcelDna

      # 1️⃣2️⃣ 上传 XLL artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyAddin-xll
          path: ExcelDna\MyFunctions.xll